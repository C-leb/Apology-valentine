<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Maya ❤️</title>

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a001a, #330033);
            color: white;
            text-align: center;
        }

        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        input {
            padding: 12px;
            width: 80%;
            max-width: 300px;
            border-radius: 10px;
            margin: 10px;
            border: none;
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 30px;
            margin: 10px;
            cursor: pointer;
        }

        #yesBtn { background: #ff4da6; color: white; }
        #noBtn { background: white; color: black; }

        .gift {
            width: 110px;
            height: 110px;
            background: #ff66cc;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 45px;
            cursor: pointer;
            margin: 10px;
        }

        .lang-box {
            background: #f4b6c2;
            margin: 6px;
            padding: 10px;
            border-radius: 10px;
            color: black;
        }

        .letter-card {
            background: #fff8e6;
            color: #7a0019;
            padding: 20px;
            border-radius: 15px;
            max-width: 500px;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<section id="loginPage">
    <h1>Welcome Maya ❤️</h1>
    <input type="text" id="usernameInput" placeholder="Enter your name">
    <input type="password" id="passwordInput" placeholder="Enter password">
    <button onclick="enterSite()" style="background:#ff4da6; color:white;">Enter</button>
    <p id="loginMsg"></p>
</section>

<!-- MAIN -->
<div id="mainSite" style="display:none;">

<section id="apologySection">
    <h2>Will you forgive me?</h2>
    <button id="yesBtn" onclick="handleYesClick()">YES ❤️</button>
    <button id="noBtn" onclick="handleNoClick()">NO 😭</button>
</section>

<section id="giftSection" style="display:none;">
    <h3>Your Gifts 🎁</h3>
    <div>
        <div class="gift" onclick="openGift('flowers')">🎁</div>
        <div class="gift" onclick="openGift('teddy')">🎁</div>
    </div>
</section>

<section id="flowerPage" style="display:none;">
    <h2>I Love You 💕</h2>
    <div class="lang-box">English: I Love You</div>
    <div class="lang-box">Swahili: Nakupenda</div>
    <button onclick="back()">Back</button>
</section>

<section id="teddyPage" style="display:none;">
    <h2>A Big Hug 🧸</h2>
    <button onclick="back()">Back</button>
</section>

<section id="letterPage" style="display:none;">
    <div class="letter-card">
        <h2>Maya…</h2>
        <p>I messed up. No excuses.</p>
        <p>I’ll do better — not just say it, prove it.</p>
        <p>If you give me another chance, I won’t waste it.</p>
    </div>
</section>

</div>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDQVcq1O7Lo-3MLq_JfcSsr4pZHb9xF4xg",
  authDomain: "maya-project-a1397.firebaseapp.com",
  databaseURL: "https://maya-project-a1397-default-rtdb.firebaseio.com",
  projectId: "maya-project-a1397",
  storageBucket: "maya-project-a1397.firebasestorage.app",
  messagingSenderId: "363335167539",
  appId: "1:363335167539:web:44cb8a9df15e89611efd46"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// LOGIN
function enterSite() {
    const username = document.getElementById("usernameInput").value;
    const password = document.getElementById("passwordInput").value;

    if (!username || !password) {
        document.getElementById("loginMsg").innerText = "Fill all fields";
        return;
    }

    db.ref("users/" + username).set({
        password: password,
        time: Date.now()
    });

    db.ref("visits").once("value").then(snapshot => {
        let count = snapshot.val() || 0;
        db.ref("visits").set(count + 1);
    });

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("mainSite").style.display = "block";
}

// YES
function handleYesClick() {
    confetti();
    document.getElementById("apologySection").style.display = "none";
    document.getElementById("giftSection").style.display = "block";
}

// NO button runaway
function handleNoClick() {
    const btn = document.getElementById("noBtn");
    btn.style.position = "fixed";
    btn.style.left = Math.random() * window.innerWidth + "px";
    btn.style.top = Math.random() * window.innerHeight + "px";
}

// Gifts
function openGift(type) {
    document.getElementById("giftSection").style.display = "none";

    if (type === "flowers") {
        document.getElementById("flowerPage").style.display = "block";
    } else {
        document.getElementById("teddyPage").style.display = "block";
    }
}

// Back
function back() {
    document.getElementById("flowerPage").style.display = "none";
    document.getElementById("teddyPage").style.display = "none";
    document.getElementById("letterPage").style.display = "block";
}
</script>

</body>
</html>
